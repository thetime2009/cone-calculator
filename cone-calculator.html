<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>โปรแกรมคำนวณกรวย PTTS </title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
background:#f0f2f5;
margin:0;
}

.header{
background:#1f3a60;
color:white;
padding:15px;
font-size:20px;
text-align:center;
}

.container{
padding:20px;
max-width:500px;
margin:auto;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
margin-bottom:20px;
}

input{
width:100%;
padding:10px;
margin-top:5px;
margin-bottom:15px;
font-size:16px;
}

button{
width:100%;
padding:12px;
background:#007bff;
color:white;
border:none;
border-radius:8px;
font-size:18px;
cursor:pointer;
}

button:hover{
background:#0056b3;
}

.result{
font-size:16px;
line-height:1.6;
}

canvas{
background:white;
border:1px solid #ccc;
border-radius:10px;
margin-top:10px;
}

</style>
</head>

<body>

<div class="header">
Cone Tank Factory Calculator
</div>

<div class="container">

<div class="card">

<label>D1 (เส้นผ่านศูนย์กลางบน)</label>
<input id="d1" type="number">

<label>D2 (เส้นผ่านศูนย์กลางล่าง)</label>
<input id="d2" type="number">

<label>H (ความสูง)</label>
<input id="h" type="number">

<button onclick="calculate()">คำนวณ</button>

</div>

<div class="card result" id="result"></div>

<div class="card">

Flat Pattern

<canvas id="canvas" width="400" height="400"></canvas>

</div>

</div>

<script>

function calculate(){

let d1=parseFloat(document.getElementById("d1").value);
let d2=parseFloat(document.getElementById("d2").value);
let h=parseFloat(document.getElementById("h").value);

let r1=d1/2;
let r2=d2/2;

let L=Math.sqrt(h*h+(r2-r1)*(r2-r1));

let Rbig=(L*r2)/(r2-r1);
let Rsmall=(L*r1)/(r2-r1);

let beta=(360*(r2-r1))/L;

let lengthD1=Math.PI*d1;
let lengthD2=Math.PI*d2;

document.getElementById("result").innerHTML=`

<b>ผลลัพธ์</b><br><br>

Slant Height (L) = ${L.toFixed(2)}<br>
Angle (β) = ${beta.toFixed(2)}°<br><br>

R ใหญ่ = ${Rbig.toFixed(2)}<br>
R เล็ก = ${Rsmall.toFixed(2)}<br><br>

ความยาวรอบ D1 = ${lengthD1.toFixed(2)}<br>
ความยาวรอบ D2 = ${lengthD2.toFixed(2)}

`;

drawPattern(Rbig,Rsmall,beta);

}

function drawPattern(Rbig,Rsmall,beta){

let canvas=document.getElementById("canvas");
let ctx=canvas.getContext("2d");

ctx.clearRect(0,0,400,400);

let centerX=200;
let centerY=200;

let scale=0.4;

let start=0;
let end=beta*Math.PI/180;

ctx.beginPath();
ctx.arc(centerX,centerY,Rbig*scale,start,end);
ctx.arc(centerX,centerY,Rsmall*scale,end,start,true);
ctx.closePath();
ctx.stroke();

}

</script>

</body>
</html>
