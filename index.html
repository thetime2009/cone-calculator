<!DOCTYPE html>

<html lang="th">
<head>
<meta charset="UTF-8">
<title>Cone Frustum PRO+</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
text-align:center;
}

.box{
background:white;
width:420px;
margin:auto;
padding:20px;
margin-top:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

input{
width:90%;
padding:10px;
margin:6px;
font-size:16px;
text-align:center;
}

button{
width:95%;
padding:12px;
margin-top:8px;
font-size:16px;
background:#007bff;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

canvas{
margin-top:20px;
border:1px solid #ccc;
background:white;
}

.result{
font-size:17px;
margin-top:10px;
line-height:1.6;
text-align:left;
}

</style>

</head>

<body>

<div class="box">

<h2>Cone Calculator PRO+</h2>

<input id="d1" placeholder="D1 เส้นผ่านศูนย์กลางบน">
<input id="d2" placeholder="D2 เส้นผ่านศูนย์กลางล่าง">
<input id="h" placeholder="H ความสูง">

<input id="seam" placeholder="Seam allowance ต่อด้าน (mm)">

<button onclick="calc()">คำนวณ</button>

<div id="result" class="result"></div>

<canvas id="pattern" width="380" height="320"></canvas>

</div>

<script>

let Rbig=0,Rsmall=0,beta=0;

function calc(){

let d1=parseFloat(document.getElementById("d1").value);
let d2=parseFloat(document.getElementById("d2").value);
let h=parseFloat(document.getElementById("h").value);
let seam=parseFloat(document.getElementById("seam").value)||0;

if(!d1||!d2||!h){
alert("กรอกข้อมูลให้ครบ");
return;
}

/* เพิ่มเผื่อเชื่อมซ้าย+ขวา */

let d1_seam=d1+(seam*2);
let d2_seam=d2+(seam*2);

let r1=d1_seam/2;
let r2=d2_seam/2;

let L=Math.sqrt(h*h+(r2-r1)*(r2-r1));

beta=360*(r2-r1)/L;

Rbig=(r2*L)/(r2-r1);
Rsmall=(r1*L)/(r2-r1);

/* ความยาวรอบ */

let length1=Math.PI*d1_seam;
let length2=Math.PI*d2_seam;

document.getElementById("result").innerHTML=

`
<b>ขนาดก่อนเผื่อเชื่อม</b><br>
D1 = ${d1}<br>
D2 = ${d2}<br><br>

<b>ขนาดหลังเผื่อเชื่อม</b><br>
D1 = ${d1_seam.toFixed(2)}<br>
D2 = ${d2_seam.toFixed(2)}<br><br>

Slant Height (L) = ${L.toFixed(2)}<br>
Angle β = ${beta.toFixed(2)}°<br><br>

R ใหญ่ = ${Rbig.toFixed(2)}<br>
R เล็ก = ${Rsmall.toFixed(2)}<br><br>

ความยาวรอบบน = ${length1.toFixed(2)}<br>
ความยาวรอบล่าง = ${length2.toFixed(2)}
`;

drawPattern();

}

function drawPattern(){

let canvas=document.getElementById("pattern");
let ctx=canvas.getContext("2d");

ctx.clearRect(0,0,380,320);

let cx=190;
let cy=160;

let scale=0.35;

let big=Rbig*scale;
let small=Rsmall*scale;

let angle=beta*Math.PI/180;

/* วาดกรวยคลี่ */

ctx.beginPath();
ctx.arc(cx,cy,big,0,angle);
ctx.arc(cx,cy,small,angle,0,true);
ctx.closePath();

ctx.lineWidth=2;
ctx.strokeStyle="black";
ctx.stroke();

/* เส้นขอบด้านข้าง */

ctx.beginPath();
ctx.moveTo(cx+small,cy);
ctx.lineTo(cx+big,cy);
ctx.stroke();

}

</script>

</body>
</html>
