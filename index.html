<!DOCTYPE html>

<html lang="th">
<head>
<meta charset="UTF-8">
<title>Cone Calculator</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
text-align:center;
}

.box{
background:white;
width:420px;
margin:auto;
padding:20px;
margin-top:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

input{
width:90%;
padding:10px;
margin:6px;
font-size:16px;
text-align:center;
}

button{
width:95%;
padding:12px;
margin-top:8px;
font-size:16px;
background:#1a73e8;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

canvas{
margin-top:20px;
border:1px solid #ccc;
background:white;
}

.result{
font-size:18px;
margin-top:10px;
line-height:1.6;
}

</style>

</head>

<body>

<div class="box">

<h2>Cone Calculator</h2>

<input id="d1" placeholder="D1 เส้นผ่านศูนย์กลางบน">
<input id="d2" placeholder="D2 เส้นผ่านศูนย์กลางล่าง">
<input id="h" placeholder="H ความสูง">

<button onclick="calc()">คำนวณ</button>

<div id="result" class="result"></div>

<canvas id="pattern" width="380" height="320"></canvas>

</div>

<script>

let Rbig=0;
let Rsmall=0;
let beta=0;

function calc(){

let d1=parseFloat(document.getElementById("d1").value);
let d2=parseFloat(document.getElementById("d2").value);
let h=parseFloat(document.getElementById("h").value);

if(!d1||!d2||!h){
alert("กรอกข้อมูลให้ครบ");
return;
}

let r1=d1/2;
let r2=d2/2;

let L=Math.sqrt(h*h+(r2-r1)*(r2-r1));

beta=360*(r2-r1)/L;

Rbig=(r2*L)/(r2-r1);
Rsmall=(r1*L)/(r2-r1);

let length1=Math.PI*d1;
let length2=Math.PI*d2;

document.getElementById("result").innerHTML=

`
L = ${L.toFixed(2)} <br>
β = ${beta.toFixed(2)}° <br>

R ใหญ่ = ${Rbig.toFixed(2)} <br>
R เล็ก = ${Rsmall.toFixed(2)} <br>

ความยาวรอบบน = ${length1.toFixed(2)} <br>
ความยาวรอบล่าง = ${length2.toFixed(2)}
`;

drawPattern();

}

function drawPattern(){

let canvas=document.getElementById("pattern");
let ctx=canvas.getContext("2d");

ctx.clearRect(0,0,380,320);

let maxR=Math.max(Rbig,Rsmall);

let scale=150/maxR;

let big=Rbig*scale;
let small=Rsmall*scale;

let angle=beta*Math.PI/180;

let cx=40;
let cy=280;

ctx.beginPath();

ctx.arc(cx,cy,big,0,angle);

ctx.arc(cx,cy,small,angle,0,true);

ctx.closePath();

ctx.lineWidth=2;
ctx.strokeStyle="black";
ctx.stroke();

ctx.beginPath();

ctx.moveTo(cx,cy);

ctx.lineTo(
cx+Math.cos(angle)*big,
cy-Math.sin(angle)*big
);

ctx.stroke();

}

</script>

</body>
</html>
