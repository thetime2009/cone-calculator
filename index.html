<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Cone Frustum PRO+</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body{
font-family:Arial;
background:#f2f2f2;
text-align:center;
}

.box{
background:white;
width:420px;
margin:auto;
padding:20px;
margin-top:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

input,select{
width:90%;
padding:10px;
margin:6px;
font-size:16px;
text-align:center;
}

button{
width:95%;
padding:12px;
margin-top:8px;
font-size:16px;
background:#007bff;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

canvas{
margin-top:20px;
}

.result{
font-size:18px;
margin-top:10px;
}

</style>
</head>

<body>

<div class="box">

<h2>Cone Calculator PRO+</h2>

<select id="unit">
<option value="mm">mm</option>
<option value="cm">cm</option>
</select>

<input id="d1" placeholder="D1 เส้นผ่านศูนย์กลางบน">
<input id="d2" placeholder="D2 เส้นผ่านศูนย์กลางล่าง">
<input id="h" placeholder="H ความสูง">

<input id="thickness" placeholder="Thickness ความหนาแผ่น">
<input id="seam" placeholder="Seam allowance เผื่อเชื่อม">

<button onclick="calc()">คำนวณ</button>

<button onclick="exportDXF()">Download DXF</button>

<button onclick="exportPDF()">Download PDF</button>

<div id="result" class="result"></div>

<canvas id="pattern" width="350" height="300"></canvas>

</div>

<script>

let Rbig,Rsmall,beta;

function calc(){

let d1=parseFloat(document.getElementById("d1").value);
let d2=parseFloat(document.getElementById("d2").value);
let h=parseFloat(document.getElementById("h").value);

let seam=parseFloat(document.getElementById("seam").value)||0;

if(!d1||!d2||!h){
alert("กรอกข้อมูลให้ครบ");
return;
}

d1+=seam
d2+=seam

let r1=d1/2;
let r2=d2/2;

let L=Math.sqrt(h*h+(r2-r1)*(r2-r1));

beta=360*(r2/L);

Rbig=(r2*L)/(r2-r1);
Rsmall=(r1*L)/(r2-r1);

document.getElementById("result").innerHTML=

`
L = ${L.toFixed(2)} <br>
β = ${beta.toFixed(2)}° <br>
R ใหญ่ = ${Rbig.toFixed(2)} <br>
R เล็ก = ${Rsmall.toFixed(2)}
`;

drawPattern();

}

function drawPattern(){

let canvas=document.getElementById("pattern");
let ctx=canvas.getContext("2d");

ctx.clearRect(0,0,350,300);

let cx=175;
let cy=150;

let scale=0.4;

let big=Rbig*scale;
let small=Rsmall*scale;

let angle=beta*Math.PI/180;

ctx.beginPath();
ctx.arc(cx,cy,big,0,angle);
ctx.arc(cx,cy,small,angle,0,true);
ctx.closePath();
ctx.stroke();

}

function exportDXF(){

if(!Rbig) return alert("คำนวณก่อน");

let dxf=

`0
SECTION
2
ENTITIES
0
ARC
8
0
10
0
20
0
40
${Rbig}
50
0
51
${beta}
0
ARC
8
0
10
0
20
0
40
${Rsmall}
50
0
51
${beta}
0
ENDSEC
0
EOF`

let blob=new Blob([dxf],{type:"application/dxf"})

let a=document.createElement("a")
a.href=URL.createObjectURL(blob)
a.download="cone_pattern.dxf"
a.click()

}

function exportPDF(){

const { jsPDF } = window.jspdf;

let doc=new jsPDF();

doc.text("Cone Frustum Calculation",20,20);

doc.text("R ใหญ่: "+Rbig.toFixed(2),20,40);
doc.text("R เล็ก: "+Rsmall.toFixed(2),20,50);
doc.text("Angle β: "+beta.toFixed(2),20,60);

doc.save("cone_pattern.pdf")

}

</script>

</body>
</html>
